apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: 546941058014.dkr.ecr.us-east-2.amazonaws.com/notification-service:latest
        ports:
        - containerPort: 5000
